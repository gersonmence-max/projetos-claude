<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" role="img" aria-label="ZionTec Power Solutions">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:wght@500&amp;display=swap');
    </style>
  </defs>

  <!-- Z GLYPH MARK — diagonal at 48.5° references solar panel optimal tilt for New England -->
