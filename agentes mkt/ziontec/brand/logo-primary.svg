  <!-- WORDMARK -->
  <text x="76" y="68"
        font-family="'Bebas Neue', 'Arial Narrow', sans-serif"
        font-size="72"
        letter-spacing="2"
        fill="#E8B800">IONTEC</text>

  <!-- TAGLINE -->
  <text x="76" y="90"
        font-family="'DM Sans', 'Arial', sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="5"
        fill="#E8B800"
        opacity="0.75">POWER SOLUTIONS</text>
</svg>
