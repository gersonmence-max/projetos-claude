name: 🤖 Orquestrador de Agentes - Análise Automática 2AM

on:
  schedule:
    # 2AM horário de Brasília (5AM UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  orquestrador-diario:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      repository-projects: write

    steps:
      - name: 📦 Clonar repositório
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📥 Instalar dependências
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install python-dateutil pytz requests beautifulsoup4 groq

      - name: 🧠 Executar Orquestrador - Descobrir Projetos
        run: |
          python << 'EOF'
          import os
          import json
          from pathlib import Path
          from datetime import datetime

          print("=" * 80)
          print("🚀 ORQUESTRADOR DE AGENTES - EXECUÇÃO AUTOMÁTICA")
          print(f"⏰ Horário: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
          print("=" * 80)

          # Descobre todos os projetos
          base_dir = Path('.')
          projetos = []

          for folder in base_dir.iterdir():
              if folder.is_dir() and not folder.name.startswith('.'):
                  projeto_file = folder / 'PROJETO.txt'
                  if projeto_file.exists():
                      projetos.append(folder.name)
                      print(f"✅ Encontrado: {folder.name}")

          print(f"\n📊 Total de projetos: {len(projetos)}")

          # Salva lista de projetos para próximo step
          with open('/tmp/projetos.json', 'w') as f:
              json.dump(projetos, f)

          EOF

      - name: 🔍 Executar 6 Agentes para cada Projeto
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python << 'EOF'
          import json
          import os
          import time
          from pathlib import Path
          from datetime import datetime
          from groq import Groq

          client = Groq(api_key=os.environ["GROQ_API_KEY"])
          MODEL = "llama-3.3-70b-versatile"

          def chamar_groq(system_prompt, contexto, projeto):
              try:
                  response = client.chat.completions.create(
                      model=MODEL,
                      messages=[
                          {"role": "system", "content": system_prompt},
                          {"role": "user", "content": f"Projeto: {projeto}\n\n{contexto}"}
                      ],
                      max_tokens=1024,
                      temperature=0.3,
                  )
                  return response.choices[0].message.content
              except Exception as e:
                  return f"ERRO: {e}"

          AGENTES = [
              ("🔍 Revisor", "Você é um revisor de código experiente. Analise o projeto descrito e aponte os 3 principais problemas ou melhorias de qualidade de código. Seja direto e específico."),
              ("🛡️ Segurança", "Você é um especialista em segurança. Analise o projeto descrito e identifique as 3 principais vulnerabilidades ou riscos de segurança. Inclua como mitigar cada uma."),
              ("⚡ Performance", "Você é um especialista em performance. Analise o projeto descrito e aponte os 3 principais gargalos ou oportunidades de otimização de desempenho."),
              ("🏗️ Arquiteto", "Você é um arquiteto de software sênior. Analise o projeto descrito e sugira as 3 principais melhorias de arquitetura, padrões ou estrutura do sistema."),
              ("💻 Programador", "Você é um programador sênior. Analise o projeto descrito e sugira as 3 principais melhorias de implementação, refatorações ou funcionalidades faltantes."),
              ("📊 Consolidador", "Você é um tech lead. Baseado no projeto descrito, crie um resumo executivo com as 5 ações mais importantes a tomar nas próximas 2 semanas, em ordem de prioridade."),
          ]

          with open('/tmp/projetos.json', 'r') as f:
              projetos = json.load(f)

          if not projetos:
              print("⚠️ Nenhum projeto encontrado")
              exit(0)

          print("\n" + "=" * 80)
          print(f"🤖 INICIANDO ANÁLISE COM 6 AGENTES GROQ ({MODEL})")
          print("=" * 80)

          for projeto in projetos:
              print(f"\n📁 Analisando: {projeto}")
              projeto_dir = Path(projeto)

              if not projeto_dir.exists():
                  print(f"❌ Pasta não encontrada: {projeto}")
                  continue

              projeto_file = projeto_dir / 'PROJETO.txt'
              if not projeto_file.exists():
                  print(f"⚠️ PROJETO.txt não encontrado em {projeto}")
                  continue

              with open(projeto_file, 'r', encoding='utf-8') as f:
                  contexto = f.read()

              print(f"✅ Contexto lido ({len(contexto)} caracteres)")

              sugestoes_dir = Path(f'sugestoes/{projeto}')
              sugestoes_dir.mkdir(parents=True, exist_ok=True)

              sugestoes_file = sugestoes_dir / f'{projeto}_sugestoes_{datetime.now().strftime("%Y%m%d_%H%M%S")}.txt'
              resultados = []

              for nome, system_prompt in AGENTES:
                  print(f"  {nome}: chamando Groq...")
                  resposta = chamar_groq(system_prompt, contexto, projeto)
                  resultados.append((nome, resposta))
                  time.sleep(1)  # respeita rate limit

              with open(sugestoes_file, 'w', encoding='utf-8') as f:
                  f.write(f"📊 ANÁLISE DO PROJETO: {projeto}\n")
                  f.write(f"⏰ Data: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
                  f.write(f"🤖 Modelo: {MODEL}\n")
                  f.write("=" * 80 + "\n\n")
                  for nome, resposta in resultados:
                      f.write(f"\n{'=' * 40}\n{nome}\n{'=' * 40}\n")
                      f.write(resposta + "\n")

              print(f"  ✅ Sugestões salvas em: {sugestoes_file}")

          print("\n" + "=" * 80)
          print("✅ ANÁLISE CONCLUÍDA COM SUCESSO")
          print("=" * 80)

          EOF

      - name: 📤 Fazer Commit dos Resultados
        run: |
          git config user.name "Orquestrador Bot"
          git config user.email "orquestrador@github.local"

          # Adiciona arquivos de sugestões
          git add sugestoes/ 2>/dev/null || true

          # Verifica se há mudanças
          if git diff --cached --quiet; then
            echo "✅ Sem mudanças para commit"
          else
            git commit -m "🤖 ci: análise automática orquestrador $(date +'%Y-%m-%d %H:%M')"

            # Tenta fazer push com retry
            attempt=1
            max_attempts=3
            while [ $attempt -le $max_attempts ]; do
              if git push origin main 2>/dev/null; then
                echo "✅ Push concluído com sucesso"
                break
              else
                echo "⚠️ Tentativa $attempt/$max_attempts falhou. Aguardando..."
                sleep $((attempt * 10))
                git pull --rebase origin main 2>/dev/null || true
                attempt=$((attempt + 1))
              fi
            done
          fi

      - name: 📊 Resumo da Execução
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "✅ ORQUESTRADOR EXECUTADO"
          echo "════════════════════════════════════════════════════════════"
          echo "📅 Data/Hora: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "🔗 Repositório: ${{ github.repository }}"
          echo "📍 Branch: main"
          echo "🤖 Agentes: 6 (Revisor, Segurança, Performance, Arquiteto, Programador, Consolidador)"
          echo "────────────────────────────────────────────────────────────"
          echo "📂 Resultados salvos em: sugestoes/"
          echo "════════════════════════════════════════════════════════════"

  notificar-resultado:
    needs: orquestrador-diario
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: ✅ Execução Concluída
        run: |
          echo "🎉 Workflow concluído!"
          echo "Status: ${{ job.status }}"
