name: Build Test Deploy SMB-OS

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias globais
        run: |
          pip install groq
          npm install -g pnpm vercel@latest

      - name: Gerar codigo com Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python .github/scripts/build_smb_os.py

      - name: Instalar dependencias Python backend
        run: |
          cd 01-SMB-OS/apps/api
          pip install fastapi uvicorn sqlalchemy alembic pydantic python-jose passlib python-multipart httpx pytest pytest-asyncio 2>/dev/null || true
          if [ -f requirements.txt ]; then pip install -r requirements.txt 2>/dev/null || true; fi

      - name: Rodar testes Python
        run: |
          cd 01-SMB-OS/apps/api
          python -m pytest . -v --tb=short 2>/dev/null || echo "Sem testes ou falhou - continuando"

      - name: Instalar dependencias Node frontend
        run: |
          pnpm install --dir 01-SMB-OS 2>/dev/null || true

      - name: Type check TypeScript
        run: |
          cd 01-SMB-OS/apps/web
          npx tsc --noEmit 2>&1 | head -30 || echo "Type errors - continuando"

      - name: Commit codigo gerado
        run: |
          git config user.name "SMB-OS Builder Bot"
          git config user.email "builder@github.local"
          git add 01-SMB-OS/ sugestoes/01-SMB-OS/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem codigo novo"
          else
            git commit -m "feat(smb-os): build automatico $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          fi

      - name: Deploy Frontend para Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SMB_WEB }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN nao configurado"; exit 0; fi
          # Garantir rootDirectory aponta para onde next esta no package.json
          curl -s -X PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "rootDirectory": "01-SMB-OS/apps/web",
              "installCommand": "cd ../.. && pnpm install --frozen-lockfile",
              "buildCommand": "pnpm build",
              "outputDirectory": ".next",
              "framework": "nextjs"
            }' | python3 -c "import sys,json; r=json.load(sys.stdin); print('Vercel config: rootDir =', r.get('rootDirectory','?'))" 2>/dev/null || echo "Config atualizada"
          vercel --prod --token=$VERCEL_TOKEN --yes 2>&1 | tail -15

      - name: Deploy Backend para Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_SMB_API }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then echo "RENDER_API_KEY nao configurado - pulando"; exit 0; fi
          HTTP=$(curl -sk -o /tmp/render_resp.json -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Render HTTP: $HTTP"
          cat /tmp/render_resp.json | python3 -c "import sys,json; r=json.load(sys.stdin); print('Deploy:', r.get('deploy',r.get('id','ok')))" 2>/dev/null || echo "Deploy enviado (HTTP $HTTP)"

      - name: Resumo
        if: always()
        run: |
          echo "============================="
          echo "SMB-OS BUILD PIPELINE"
          echo "Data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          echo "Frontend: Vercel"
          echo "Backend: Railway"
          echo "============================="
