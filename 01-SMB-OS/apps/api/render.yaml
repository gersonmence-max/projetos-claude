services:
  - type: web
    name: smb-os-api
    runtime: python
    rootDir: 01-SMB-OS/apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
